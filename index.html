<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>D-Fit</title>
<style>
  body { font-family: Arial, sans-serif; background: #f2f2f2; text-align: center; padding: 50px; }
  h1 { color: #2e7d32; }
  input, button { padding: 10px; margin: 10px; font-size: 16px; }
  #result { margin-top: 20px; font-size: 20px; color: #d32f2f; }
  button { background-color: #2e7d32; color: white; border: none; cursor: pointer; border-radius: 5px; }
  button:hover { background-color: #1b5e20; }
</style>
</head>
<body>
  <h1>D-Fit</h1>
  <input type="text" id="barcode" placeholder="Barkod girin veya taratın">
  <button onclick="checkHealth()">TARA</button>
  <div id="result"></div>

<script>
  const products = {
    "8691234567890": {name:"Süt", health:85},
    "8690987654321": {name:"Peynir", health:75},
    "8691122334455": {name:"Ekmek", health:60}
  };

  function checkHealth() {
    const code = document.getElementById("barcode").value;
    const output = document.getElementById("result");
    if (products[code]) {
      output.textContent = products[code].name + " → Sağlıklılık: %" + products[code].health;
    } else {
      output.textContent = "Ürün bulunamadı!";
    }
  }
</script>
</body>
</html>
