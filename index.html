<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-Fit Pro</title>
<style>
  :root { --primary: #2e7d32; --secondary: #4caf50; --bg: #f1f8e9; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0; background: var(--bg); color: #333; }
  header { background: var(--primary); color: white; padding: 25px; text-align: center; font-size: 32px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  
  nav { display: flex; justify-content: center; gap: 10px; padding: 15px; sticky: top; background: white; }
  nav button { padding: 12px 18px; border: none; border-radius: 25px; cursor: pointer; background: #e8f5e9; color: var(--primary); font-weight: 600; transition: 0.3s; }
  nav button.active { background: var(--primary); color: white; }

  section { padding: 30px 20px; display: none; max-width: 600px; margin: 20px auto; background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; }
  .active-section { display: block; animation: fadeIn 0.5s; }

  /* Sağlık Barı Tasarımı */
  .health-card { margin-top: 20px; padding: 20px; border-radius: 12px; border: 1px solid #eee; display: none; }
  .progress-container { background: #eee; border-radius: 20px; height: 25px; margin: 15px 0; overflow: hidden; }
  .progress-bar { height: 100%; width: 0%; transition: width 1s ease-in-out; }

  video { border-radius: 12px; width: 100%; max-width: 400px; background: #000; margin-top: 15px; transform: scaleX(-1); }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  footer { text-align: center; padding: 20px; color: #888; font-size: 13px; }
</style>
</head>
<body>

<header>D-Fit</header>

<nav id="mainNav">
  <button onclick="changeTab('home')" class="active">Ana Sayfa</button>
  <button onclick="changeTab('scan')">Tarayıcı</button>
  <button onclick="changeTab('tips')">Rehber</button>
</nav>

<section id="home" class="active-section">
  <h2>Merhaba Doruk! 👋</h2>
  <p>Bugün vücudun için ne kadar iyi bir seçim yapacaksın?</p>
  <div style="font-size: 50px;">🍎</div>
</section>

<section id="scan">
  <h3>Ürün Barkodunu Okut</h3>
  <video id="preview"></video>
  <div style="margin-top:15px;">
    <input type="text" id="barcode" placeholder="Barkod No" style="padding:10px; border-radius:5px; border:1px solid #ccc; width:60%;">
    <button onclick="checkHealth()" style="padding:10px 20px; background: var(--primary); color:white; border:none; border-radius:5px;">Sorgula</button>
  </div>

  <div id="resultCard" class="health-card">
    <h3 id="prodName">Ürün Adı</h3>
    <div class="progress-container">
      <div id="healthBar" class="progress-bar"></div>
    </div>
    <p id="healthText" style="font-weight: bold;"></p>
  </div>
</section>

<section id="tips">
  <h3>Günlük Sağlık İpuçları</h3>
  <ul style="text-align: left; line-height: 2;">
    <li>💧 <b>Su:</b> Günde 8 bardak.</li>
    <li>🚶 <b>Hareket:</b> Her saat başı 5 dk esne.</li>
    <li>🥗 <b>Tabak:</b> Yarısı sebze olsun.</li>
  </ul>
</section>

<footer>© 2026 D-Fit | Doruk Labs</footer>

<script src="https://unpkg.com/@zxing/library@latest"></script>
<script>
  const products = {
    "8691234567890": {name:"Organik Süt", health:95},
    "8690987654321": {name:"İşlenmiş Peynir", health:45},
    "8691122334455": {name:"Beyaz Ekmek", health:55},
    "12345": {name:"Test Elma", health:100}
  };

  const codeReader = new ZXing.BrowserBarcodeReader();
  let currentStream = null;

  function changeTab(tabId) {
    // Sekme Görünürlüğü
    document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
    document.getElementById(tabId).classList.add('active-section');
    
    // Buton Aktifliği
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    event.currentTarget.classList.add('active');

    // Kamera Kontrolü (Sadece tarama sekmesinde aç)
    if(tabId === 'scan') {
      startScanner();
    } else {
      stopScanner();
    }
  }

  function startScanner() {
    codeReader.decodeFromVideoDevice(null, 'preview', (result, err) => {
      if (result) {
        document.getElementById('barcode').value = result.text;
        checkHealth();
      }
    });
  }

  function stopScanner() {
    codeReader.reset();
  }

  function checkHealth() {
    const code = document.getElementById("barcode").value.trim();
    const card = document.getElementById("resultCard");
    const bar = document.getElementById("healthBar");
    const text = document.getElementById("healthText");
    const name = document.getElementById("prodName");

    if(products[code]) {
      const data = products[code];
      card.style.display = "block";
      name.innerText = data.name;
      text.innerText = "Sağlık Puanı: %" + data.health;
      
      // Dinamik Bar Renklendirme ve Animasyon
      bar.style.width = data.health + "%";
      if(data.health >= 80) bar.style.backgroundColor = "#2e7d32";
      else if(data.health >= 50) bar.style.backgroundColor = "#fbc02d";
      else bar.style.backgroundColor = "#d32f2f";

    } else {
      alert("Ürün sistemde kayıtlı değil!");
    }
  }
</script>
</body>
</html>
